# ================================================
# fly.toml — Fly.io configuration
# Deploy: fly deploy
# Logs:   fly logs
# SSH:    fly ssh console
# ================================================

app = "crypto-ai-trading"
primary_region = "gru"   # São Paulo — menor latência para o Brasil

[build]

[env]
  NODE_ENV = "production"
  PORT     = "3000"

# Dashboard HTTP — HTTPS automático via fly.dev
[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false   # NUNCA desligar — bot precisa rodar 24/7
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

# Máquina (free tier: shared-cpu-1x, 256MB RAM)
[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Volume persistente para trade_history.json e calibration.json
[[mounts]]
  source      = "bot_data"
  destination = "/app/data"
  initial_size = "1gb"
