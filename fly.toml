# fly.toml app configuration file generated for crypto-ai-trading on 2026-04-17T03:03:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "crypto-ai-trading"
primary_region = "gru"

[build]

[env]
  NODE_ENV     = "production"
  PORT         = "3000"
  # Limit Node.js heap to 200MB to avoid OOM on the 256MB Fly.io free tier machine
  NODE_OPTIONS = "--max-old-space-size=200"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ['app']

  [[http_service.checks]]
    grace_period  = "30s"
    interval      = "60s"
    method        = "GET"
    timeout       = "10s"
    path          = "/api/health"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

