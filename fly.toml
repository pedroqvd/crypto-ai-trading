# fly.toml app configuration file generated for crypto-ai-trading on 2026-04-17T03:03:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "crypto-ai-trading"
primary_region = "gru"   # São Paulo — menor latência para o Brasil

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
