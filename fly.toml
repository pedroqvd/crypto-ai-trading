# fly.toml app configuration file generated for crypto-ai-trading on 2026-04-17T03:03:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "crypto-ai-trading"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ['app']

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Volume persistente desativado temporariamente.
# Para ativar: instalar flyctl e rodar:
#   fly volumes create bot_data -r gru -n 1
# Depois descomentar as linhas abaixo:
# [[mounts]]
#   source      = "bot_data"
#   destination = "/app/data"
#   initial_size = "1gb"
