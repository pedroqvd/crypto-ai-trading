name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy existing machines to clear stale volume config
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          IDS=$(flyctl machines list --app crypto-ai-trading --json | jq -r '.[].id' || echo "")
          if [ -n "$IDS" ]; then
            for id in $IDS; do
              echo "Destroying machine $id"
              flyctl machine destroy "$id" --app crypto-ai-trading --force || true
            done
          else
            echo "No existing machines found"
          fi

      - name: Deploy fresh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app crypto-ai-trading --yes --strategy immediate
